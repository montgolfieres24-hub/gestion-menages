<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accès — Les Clés du Périgord</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Archivo:wght@400;600&display=swap" rel="stylesheet">
<style>
body{background:#F1EDE3;color:#2A2419;font:15px/1.5 "Archivo",sans-serif;
  display:grid;place-items:center;min-height:100vh;margin:0}
.boite{background:#FBF9F3;border:1px solid #DDD5C3;border-radius:14px;
  padding:2.2rem;width:min(92vw,360px);text-align:center}
h1{font-family:"Cormorant Garamond",serif;font-size:1.6rem;margin:0 0 .3rem}
p{color:#6D6350;margin:0 0 1.2rem}
input,button{font:inherit;width:100%;padding:.65rem .8rem;border-radius:9px;
  border:1px solid #DDD5C3;margin:.3rem 0;box-sizing:border-box}
button{background:#3E5C41;color:#fff;border:none;font-weight:600;cursor:pointer}
.err{color:#B4541E;font-weight:600}
</style>
</head>
<body>
<form class="boite" method="post" action="/login">
  <h1>Les Clés du Périgord</h1>
  <p>Planning des ménages</p>
  {% if erreur %}<p class="err">Mot de passe incorrect</p>{% endif %}
  <input type="password" name="mot_de_passe" placeholder="Mot de passe" autofocus required>
  <button type="submit">Entrer</button>
</form>
</body>
</html>
