<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block titre %}Planning des ménages{% endblock %} — Les Clés du Périgord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --pierre:#F1EDE3; --carte:#FBF9F3; --encre:#2A2419; --encre-2:#6D6350;
  --laurier:#3E5C41; --laurier-pale:#E3EAE0; --bronze:#A57A2A;
  --alerte:#B4541E; --alerte-pale:#F6E4D8; --ligne:#DDD5C3;
}
*{box-sizing:border-box;margin:0}
body{background:var(--pierre);color:var(--encre);
  font:15px/1.55 "Archivo",sans-serif;padding-bottom:6rem}
a{color:inherit}
.entete{max-width:980px;margin:0 auto;padding:2rem 1.2rem .6rem}
.haut{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:.6rem}
.marque{font-family:"Cormorant Garamond",serif;font-size:1.05rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--encre-2)}
h1{font-family:"Cormorant Garamond",serif;font-weight:600;
  font-size:clamp(1.8rem,4vw,2.4rem);line-height:1.1}
.cle{display:block;width:120px;height:14px;margin:.5rem 0 0;color:var(--bronze)}
.onglets{display:flex;gap:.3rem;margin-top:1.1rem;border-bottom:1px solid var(--ligne);flex-wrap:wrap}
.onglets a{padding:.55rem .95rem;border-radius:10px 10px 0 0;text-decoration:none;
  font-weight:500;color:var(--encre-2);border:1px solid transparent;border-bottom:none}
.onglets a.actif{background:var(--carte);border-color:var(--ligne);
  color:var(--encre);font-weight:600;margin-bottom:-1px}
.wrap{max-width:980px;margin:0 auto;padding:1rem 1.2rem 0}
.compteurs{display:flex;gap:1.6rem;color:var(--encre-2)}
.compteurs strong{color:var(--encre);font-size:1.2rem;margin-right:.3rem}
.flash{border-radius:10px;padding:.7rem 1rem;margin:.4rem 0 1rem;font-weight:500}
.flash.ok{background:var(--laurier-pale);color:var(--laurier)}
.flash.ko{background:var(--alerte-pale);color:var(--alerte)}
select,button,input[type=number]{font:inherit;border-radius:9px;border:1px solid var(--ligne);
  background:#fff;padding:.45rem .7rem;color:var(--encre)}
select:focus,button:focus,input:focus{outline:2px solid var(--laurier);outline-offset:1px}
.badge{font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:.22rem .55rem;border-radius:99px}
.badge.depart{background:var(--encre);color:var(--carte)}
.badge.arrivee{border:1px solid var(--ligne)}
.badge.prio{background:var(--alerte);color:#fff}
.statut{font-size:.8rem;font-weight:600;padding:.25rem .6rem;border-radius:99px;white-space:nowrap}
.statut.s-aplanifier{background:var(--alerte-pale);color:var(--alerte)}
.statut.s-assigne{background:#EAE4D2;color:#7A6320}
.statut.s-envoye{background:var(--laurier-pale);color:var(--laurier)}
.statut.s-fait{background:var(--laurier);color:#fff}
.vide{color:var(--encre-2);font-style:italic;padding:2rem 0}
.nav-mois{display:flex;align-items:center;gap:1rem;margin:1rem 0}
.nav-mois h2{font-family:"Cormorant Garamond",serif;font-size:1.5rem;min-width:12rem;text-align:center}
.nav-mois a{text-decoration:none;font-weight:600;padding:.3rem .8rem;
  border:1px solid var(--ligne);border-radius:9px;background:var(--carte)}
{% block style %}{% endblock %}
</style>
</head>
<body>
<header class="entete">
  <div class="haut">
    <div>
      <div class="marque">Les Clés du Périgord</div>
      <h1>{% block h1 %}Planning des ménages{% endblock %}</h1>
      <svg class="cle" viewBox="0 0 120 14" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.6"/>
        <path d="M12 7h100M96 7v4M104 7v4M112 7v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    {% block coin %}{% endblock %}
  </div>
  <nav class="onglets">
    <a href="/" class="{{ 'actif' if onglet == 'dashboard' }}">Tableau de bord</a>
    <a href="/disponibilites" class="{{ 'actif' if onglet == 'dispos' }}">Disponibilités</a>
    <a href="/planning" class="{{ 'actif' if onglet == 'planning' }}">Vue mensuelle</a>
  </nav>
</header>
<main class="wrap">
{% block contenu %}{% endblock %}
</main>
{% block pied %}{% endblock %}
</body>
</html>
